services:
  postgres:
    image: postgres:16
    container_name: vigil_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vigil
      POSTGRES_PASSWORD: vigil
      POSTGRES_DB: vigil
    ports:
      - "5432:5432"
    volumes:
      - vigil_pgdata:/var/lib/postgresql/data

volumes:
  vigil_pgdata:
